<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-slate-900 via-gray-800 to-slate-900 min-h-screen flex justify-center items-center p-4">

<div class="bg-white/95 backdrop-blur-md p-8 rounded-2xl w-full max-w-md shadow-2xl border border-white">

<h2 class="text-2xl font-bold mb-2 text-center text-gray-800">Mark Attendance</h2>
<p class="text-center text-gray-500 mb-6 text-sm">Add and view student attendance records</p>

<label class="text-sm font-semibold text-gray-600">Student Name</label>
<input id="studentName" placeholder="Enter student name" class="w-full p-3 border border-gray-300 mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">

<label class="text-sm font-semibold text-gray-600">Date</label>
<input id="date" type="date" class="w-full p-3 border border-gray-300 mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">

<label class="text-sm font-semibold text-gray-600">Status</label>
<select id="status" class="w-full p-3 border border-gray-300 mb-5 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
</select>

<button onclick="addAttendance()" class="bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-orange-500 hover:to-red-500 text-white w-full p-3 rounded-lg font-semibold shadow-md transition duration-300">
Add Attendance
</button>



<ul id="list" class="space-y-2 max-h-60 overflow-y-auto"></ul>

</div>

<script>
const list = document.getElementById("list");

function addAttendance() {
    const studentName = document.getElementById("studentName").value;
    const date = document.getElementById("date").value;
    const status = document.getElementById("status").value;

    fetch("http://localhost:5000/attendance/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ studentName, date, status })
    })
    .then(res => res.json())
    .then(() => loadAttendance());
}

function loadAttendance() {
    fetch("http://localhost:5000/attendance")
    .then(res => res.json())
    .then(data => {
        list.innerHTML = "";
        data.forEach(a => {
            list.innerHTML += `
            <li class="bg-orange-50 border-l-4 border-orange-400 p-3 rounded-lg shadow-sm text-sm text-gray-700 flex justify-between items-center">
                <span>
                    <b>${a.studentName}</b><br>
                    <span class="text-gray-500">${a.date}</span>
                </span>
                <span class="${a.status === 'Present' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} px-3 py-1 rounded-full text-xs font-bold">
                    ${a.status}
                </span>
            </li>`;
        });
    });
}

loadAttendance();
</script>

</body>
</html>
