<!DOCTYPE html>
<html>
<head>
<title>Teacher Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-slate-900 via-gray-800 to-slate-900 min-h-screen flex justify-center items-center p-4">

<div class="bg-white/10 backdrop-blur-lg border border-white/20 p-8 rounded-3xl w-full max-w-sm shadow-2xl">

<h2 class="text-3xl mb-2 text-center font-bold text-white">
👨‍🏫 Teacher Login
</h2>

<p class="text-center text-gray-300 text-sm mb-6">
Login to access teacher dashboard
</p>

<label class="text-sm font-semibold text-gray-300">Username</label>
<input id="u" placeholder="Teacher Username" class="border border-white/20 bg-white/10 text-white placeholder-gray-400 p-3 w-full mb-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400">

<label class="text-sm font-semibold text-gray-300">Password</label>
<input id="p" type="password" placeholder="Password" class="border border-white/20 bg-white/10 text-white placeholder-gray-400 p-3 w-full mb-5 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400">

<button onclick="login()" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-indigo-600 hover:to-purple-600 text-white w-full p-3 rounded-xl font-semibold shadow-lg transition duration-300">
Login
</button>

</div>

<script>
function login(){
 let username=document.getElementById("u").value.trim();
 let password=document.getElementById("p").value.trim();

 if(!username || !password){
   alert("Enter all fields");
   return;
 }

 fetch("http://localhost:5000/auth/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({username,password})
 })
 .then(res=>res.json())
 .then(d=>{
  if(d.success){
    window.location="dashboard.html";
  } else {
    alert("Wrong login");
  }
 })
 .catch(()=>alert("Server error"));
}
</script>

</body>
</html>
